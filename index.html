<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<link rel="shortcut icon" href="favicon.png" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuran Harfleri</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --deep: #0d1117;
    --surface: #161c26;
    --card-bg: #1a2235;
    --text: #f0e6cc;
    --muted: #7a8599;
    --green: #4caf7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Cinzel', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(76,175,122,0.04) 0%, transparent 50%);
  }

  h1 {
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    color: var(--gold);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 8px;
    text-align: center;
  }

  .subtitle {
    font-family: 'Scheherazade New', serif;
    font-size: 1.4rem;
    color: var(--muted);
    margin-bottom: 40px;
    text-align: center;
  }

  /* Kart alanı */
  .scene {
    width: 320px;
    height: 420px;
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 32px;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card.flipped {
    transform: rotateY(180deg);
  }

  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 20px;
    border: 1px solid rgba(201,168,76,0.25);
    background: var(--card-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.1);
  }

  .face.back {
    transform: rotateY(180deg);
    background: linear-gradient(135deg, #1a2235 0%, #1e2a3a 100%);
  }

  /* Ön yüz - Arapça harf */
  .arabic-letter {
    font-family: 'Scheherazade New', serif;
    font-size: 9rem;
    color: var(--gold-light);
    line-height: 1;
    text-shadow: 0 0 40px rgba(201,168,76,0.3);
    animation: glow 3s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { text-shadow: 0 0 30px rgba(201,168,76,0.2); }
    50%       { text-shadow: 0 0 60px rgba(201,168,76,0.5); }
  }

  .letter-number {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Arka yüz - Okuyuş */
  .pronunciation {
    font-family: 'Cinzel', serif;
    font-size: 2.2rem;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }

  .arabic-name {
    font-family: 'Scheherazade New', serif;
    font-size: 3.2rem;
    color: rgba(201,168,76,0.5);
    margin-bottom: 16px;
    direction: rtl;
  }

  .hint-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 20px;
    border-top: 1px solid rgba(201,168,76,0.1);
    padding-top: 16px;
    width: 60%;
    text-align: center;
  }

  /* Butonlar */
  .controls {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    font-family: 'Cinzel', serif;
    letter-spacing: 0.15em;
    font-size: 0.75rem;
    padding: 12px 28px;
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.25s;
    text-transform: uppercase;
  }

  #btnShow {
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
    color: var(--gold-light);
  }
  #btnShow:hover {
    background: rgba(201,168,76,0.25);
    box-shadow: 0 0 20px rgba(201,168,76,0.2);
  }

  #btnNext {
    background: transparent;
    color: var(--muted);
    border-color: rgba(255,255,255,0.1);
  }
  #btnNext:hover {
    color: var(--text);
    border-color: rgba(255,255,255,0.3);
  }

  #btnListen {
    background: linear-gradient(135deg, rgba(76,175,122,0.15), rgba(76,175,122,0.05));
    color: var(--green);
    border-color: rgba(76,175,122,0.4);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #btnListen:hover {
    background: rgba(76,175,122,0.25);
    box-shadow: 0 0 20px rgba(76,175,122,0.2);
  }
  #btnListen.speaking {
    animation: pulseGreen 0.6s ease infinite;
  }
  @keyframes pulseGreen {
    0%, 100% { box-shadow: 0 0 5px rgba(76,175,122,0.2); }
    50%      { box-shadow: 0 0 25px rgba(76,175,122,0.5); }
  }

  /* Kart üzerindeki ses ikonu */
  .sound-icon {
    position: absolute;
    bottom: 20px;
    font-size: 1.4rem;
    color: rgba(201,168,76,0.3);
    cursor: pointer;
    transition: all 0.3s;
    z-index: 10;
  }
  .sound-icon:hover {
    color: var(--gold-light);
    transform: scale(1.2);
  }
  .sound-icon.speaking {
    color: var(--green);
    animation: pulseIcon 0.6s ease infinite;
  }
  @keyframes pulseIcon {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.2); }
  }

  /* İlerleme */
  .progress {
    margin-top: 28px;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-align: center;
  }

  .progress-bar {
    width: 320px;
    height: 2px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--green));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Kart tıklama ipucu */
  .tap-hint {
    font-size: 0.65rem;
    color: rgba(122,133,153,0.5);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 10px;
    margin-bottom: 24px;
  }

  /* Shuffle animasyonu */
  .scene.shuffle {
    animation: shuffleAnim 0.4s ease;
  }
  @keyframes shuffleAnim {
    0%   { transform: translateX(0) rotate(0deg); }
    25%  { transform: translateX(-15px) rotate(-2deg); }
    75%  { transform: translateX(15px) rotate(2deg); }
    100% { transform: translateX(0) rotate(0deg); }
  }
</style>
</head>
<body>

<h1>Kuran Harfleri</h1>
<div class="subtitle">Öğreniyorum</div>

<div class="scene" id="scene" onclick="toggleCard()">
  <div class="card" id="card">
    <!-- Ön yüz: Arapça harf -->
    <div class="face front">
      <span class="letter-number" id="letterNum"></span>
      <div class="arabic-letter" id="arabicLetter"></div>
      <span class="sound-icon" id="soundIconFront" onclick="event.stopPropagation(); speakLetter()" title="Harfi dinle">🔊</span>
    </div>
    <!-- Arka yüz: Okuyuş -->
    <div class="face back">
      <div class="pronunciation" id="pronunciation"></div>
      <div class="arabic-name" id="arabicName"></div>
      <div class="hint-label">Okuyuş</div>
      <span class="sound-icon" id="soundIconBack" onclick="event.stopPropagation(); speakLetter()" title="Harfi dinle">🔊</span>
    </div>
  </div>
</div>

<div class="tap-hint">Karta tıklayın veya Boşluk tuşuna basın · → Sonraki · D Dinle</div>

<div class="controls">
  <button id="btnListen" onclick="speakLetter()">🔊 Dinle</button>
  <button id="btnShow" onclick="showPronunciation()">Göster</button>
  <button id="btnNext" onclick="nextCard()">Sonraki →</button>
</div>

<div class="progress">
  <span id="progressText"></span>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<script>
  // Kuran harfleri: harf, Türkçe okuyuş, sıra numarası
  const harfler = [
    { ar: 'ا', tr: 'Elif',   num: 1  },
    { ar: 'ب', tr: 'Be',     num: 2  },
    { ar: 'ت', tr: 'Te',     num: 3  },
    { ar: 'ث', tr: 'Se',     num: 4  },
    { ar: 'ج', tr: 'Cim',    num: 5  },
    { ar: 'ح', tr: 'Ha',     num: 6  },
    { ar: 'خ', tr: 'Hı',     num: 7  },
    { ar: 'د', tr: 'Dal',    num: 8  },
    { ar: 'ذ', tr: 'Zel',    num: 9  },
    { ar: 'ر', tr: 'Ra',     num: 10 },
    { ar: 'ز', tr: 'Ze',     num: 11 },
    { ar: 'س', tr: 'Sin',    num: 12 },
    { ar: 'ش', tr: 'Şin',    num: 13 },
    { ar: 'ص', tr: 'Sad',    num: 14 },
    { ar: 'ض', tr: 'Dad',    num: 15 },
    { ar: 'ط', tr: 'Tı',     num: 16 },
    { ar: 'ظ', tr: 'Zı',     num: 17 },
    { ar: 'ع', tr: 'Ayn',    num: 18 },
    { ar: 'غ', tr: 'Ğayn',   num: 19 },
    { ar: 'ف', tr: 'Fe',     num: 20 },
    { ar: 'ق', tr: 'Kaf',    num: 21 },
    { ar: 'ك', tr: 'Kef',    num: 22 },
    { ar: 'ل', tr: 'Lam',    num: 23 },
    { ar: 'م', tr: 'Mim',    num: 24 },
    { ar: 'ن', tr: 'Nun',    num: 25 },
    { ar: 'ه', tr: 'He',     num: 26 },
    { ar: 'و', tr: 'Vav',    num: 27 },
    { ar: 'ي', tr: 'Ye',     num: 28 },
  ];

  // Karıştırılmış sıra (Fisher-Yates)
  let queue = [];
  let current = 0;
  let seen = new Set();

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function resetQueue() {
    queue = shuffle(harfler);
    current = 0;
    seen.clear();
  }

  function loadCard(idx) {
    const h = queue[idx];
    document.getElementById('arabicLetter').textContent  = h.ar;
    document.getElementById('pronunciation').textContent = h.tr;
    document.getElementById('arabicName').textContent    = h.ar;
    document.getElementById('letterNum').textContent     = `${idx + 1} / ${harfler.length}`;
    // Ses ikonlarını sıfırla
    document.querySelectorAll('.sound-icon').forEach(el => el.classList.remove('speaking'));
    updateProgress();
  }

  function updateProgress() {
    const pct = ((current + 1) / harfler.length) * 100;
    document.getElementById('progressText').textContent = `${seen.size} harf öğrenildi`;
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function toggleCard() {
    document.getElementById('card').classList.toggle('flipped');
    seen.add(current);
    updateProgress();
  }

  function showPronunciation() {
    document.getElementById('card').classList.add('flipped');
    seen.add(current);
    updateProgress();
  }

  function nextCard() {
    // Çalan sesi durdur
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
    document.querySelectorAll('.sound-icon').forEach(el => el.classList.remove('speaking'));
    document.getElementById('btnListen').classList.remove('speaking');

    // Kart çevriliyse düz konuma döndür
    const card = document.getElementById('card');
    card.classList.remove('flipped');

    current = (current + 1) % harfler.length;
    // Sona gelince yeniden karıştır
    if (current === 0) resetQueue();

    // Shuffle animasyonu
    const scene = document.getElementById('scene');
    scene.classList.add('shuffle');
    setTimeout(() => scene.classList.remove('shuffle'), 400);

    setTimeout(() => loadCard(current), 200);
  }

  // Ses okuma fonksiyonu (Google Translate TTS)
  let currentAudio = null;

  function speakLetter() {
    const h = queue[current];
    const icons = document.querySelectorAll('.sound-icon');
    const btnListen = document.getElementById('btnListen');

    // Önceki sesi durdur
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }

    // Animasyonu başlat
    icons.forEach(el => el.classList.add('speaking'));
    btnListen.classList.add('speaking');

    // Yerel mp3 dosyası ile Arapça harfi seslendir
    const url = `audio/${h.num}.mp3`;

    const audio = new Audio(url);
    currentAudio = audio;

    audio.onended = () => {
      icons.forEach(el => el.classList.remove('speaking'));
      btnListen.classList.remove('speaking');
      currentAudio = null;
    };

    audio.onerror = () => {
      icons.forEach(el => el.classList.remove('speaking'));
      btnListen.classList.remove('speaking');
      currentAudio = null;
      // Fallback: Web Speech API dene
      speakLetterFallback(h);
    };

    audio.play().catch(() => {
      icons.forEach(el => el.classList.remove('speaking'));
      btnListen.classList.remove('speaking');
      currentAudio = null;
      speakLetterFallback(h);
    });
  }

  // Fallback: Web Speech API (Google TTS çalışmazsa)
  function speakLetterFallback(h) {
    if (!('speechSynthesis' in window)) return;

    const icons = document.querySelectorAll('.sound-icon');
    const btnListen = document.getElementById('btnListen');

    window.speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(h.ar);
    utterance.lang = 'ar-SA';
    utterance.rate = 0.7;
    utterance.volume = 1;

    const voices = window.speechSynthesis.getVoices();
    const arabicVoice = voices.find(v => v.lang.startsWith('ar'));
    if (arabicVoice) utterance.voice = arabicVoice;

    utterance.onstart = () => {
      icons.forEach(el => el.classList.add('speaking'));
      btnListen.classList.add('speaking');
    };
    utterance.onend = () => {
      icons.forEach(el => el.classList.remove('speaking'));
      btnListen.classList.remove('speaking');
    };

    window.speechSynthesis.speak(utterance);
  }

  // Klavye kısayolları
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      toggleCard();
    } else if (e.code === 'ArrowRight' || e.code === 'ArrowDown') {
      e.preventDefault();
      nextCard();
    } else if (e.code === 'KeyS' || e.code === 'KeyD') {
      e.preventDefault();
      speakLetter();
    }
  });

  // Başlat
  resetQueue();
  loadCard(current);
</script>
</body>
</html>
